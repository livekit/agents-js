packages:
  - 'agents'
  - 'plugins/*'
  - 'examples'

minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@livekit/*'
  # Renovate security update: vite@7.3.2 || 7.3.5
  - vite@7.3.2 || 7.3.5
  # Renovate security update: ws@8.20.1
  - ws@8.20.1
  # Renovate security update: vitest@4.1.0
  - vitest@4.1.0
  # Renovate security update: form-data@4.0.6
  - form-data@4.0.6
  # Renovate security update: @opentelemetry/core@2.8.0
  - '@opentelemetry/core@2.8.0'

catalog:
  '@livekit/rtc-node': ^0.13.31
  ws: ^8.21.0
  '@types/ws': ^8.5.10

patchedDependencies:
  '@changesets/assemble-release-plan': 'patches/@changesets__assemble-release-plan.patch'

# Force patched versions of transitive dependencies flagged by Dependabot. Each override is
# scoped to the vulnerable range, so it becomes inert once the parent dependency updates.
overrides:
  'adm-zip@<0.6.0': ^0.6.0
  'uuid@<11.1.1': ^11.1.1
  'lodash@<4.18.0': ^4.18.0
  'protobufjs@<7.6.5': ^7.6.5
  'ws@>=8.0.0 <8.21.0': ^8.21.0
  'js-yaml@<3.15.0': ^3.15.0
  'js-yaml@>=4.0.0 <4.3.0': ^4.3.0
  'minimatch@<3.1.3': ^3.1.3
  'minimatch@>=9.0.0 <9.0.7': ^9.0.7
  'brace-expansion@<1.1.16': ^1.1.16
  'brace-expansion@>=2.0.0 <2.1.2': ^2.1.2
  'brace-expansion@>=3.0.0 <5.0.7': ^5.0.7
  'flatted@<3.4.2': ^3.4.2
  'validator@<13.15.22': ^13.15.22
  'glob@>=10.2.0 <10.5.0': ^10.5.0

allowBuilds:
  '@google/genai': true
  '@livekit/local-inference': true
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
