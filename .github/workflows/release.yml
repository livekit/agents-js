name: Release

on:
  push:
    branches:
      - main
      - 0.x

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write # Required for OIDC
  contents: write # Required to create GH releases
  pull-requests: write # Required to interact with PRs

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          lfs: true
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - name: Use Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify non-plugin packages exist on npm
        run: |
          UNPUBLISHED_PLUGINS=()
          MISSING=()
          while IFS='|' read -r pkg pkg_dir; do
            if [ -z "$pkg" ]; then
              continue
            fi
            if ! npm view "$pkg" > /dev/null 2>&1; then
              if [[ "$pkg" == @livekit/agents-plugin-* && "$pkg_dir" == */plugins/* ]]; then
                UNPUBLISHED_PLUGINS+=("$pkg")
              else
                MISSING+=("$pkg")
              fi
            fi
          done < <(pnpm -r --silent exec -- node -e "
            const p = require('./package.json');
            if (!p.private) process.stdout.write(p.name + '|' + process.cwd() + '\n');
          ")
          if [ ${#UNPUBLISHED_PLUGINS[@]} -gt 0 ]; then
            echo "::warning::The following plugins are not yet published on npm and will be published for the first time:"
            for pkg in "${UNPUBLISHED_PLUGINS[@]}"; do
              echo "::warning::  - $pkg"
            done
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::The following non-plugin packages are not yet published on npm:"
            for pkg in "${MISSING[@]}"; do
              echo "::error::  - $pkg"
            done
            exit 1
          fi
          echo "All required packages exist on npm."
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: pnpm ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build docs
        if: steps.changesets.outputs.published == 'true'
        run: pnpm doc
      - name: S3 upload
        if: steps.changesets.outputs.published == 'true'
        run: aws s3 cp docs/ s3://livekit-docs/agents-js --recursive
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DOCS_DEPLOY_AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_DEPLOY_AWS_API_SECRET }}
          AWS_DEFAULT_REGION: 'us-east-1'
