name: Build
on:
  push:
    branches: [next, main, 0.x]
  pull_request:
    branches: [next, main, 0.x]

permissions:
  contents: read

jobs:
  reuse:
    name: REUSE-3.2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: fsfe/reuse-action@3ae3c6bdf1257ab19397fab11fd3312144692083 # v4.0.0
  lint:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - name: Setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Lint
        run: pnpm lint
      - name: Prettier
        run: pnpm format:check
      - name: Throws transformer
        run: pnpm throws:check
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - name: Setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
  # Public API checks are split into two stages so each query can run on its own runner in
  # parallel: `codeql-db` builds the CodeQL DB once and uploads it; `codeql-check` is a
  # matrix that downloads the DB and runs one target's queries + snapshot diff. Net effect:
  # wall-clock ≈ db build + slowest single query, instead of all queries sequential.
  codeql-db:
    name: CodeQL DB
    runs-on: ubuntu-latest
    env:
      # CodeQL CLI bundle (CLI + standard query packs). Keep in sync with the version used to
      # regenerate the committed snapshots in codeql/*.snapshot.txt.
      CODEQL_BUNDLE: codeql-bundle-v2.25.4
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # The api-check script uses only node built-ins + the `codeql` CLI, so we don't need
      # pnpm or node_modules here. Pre-installed Node on ubuntu-latest is recent enough for
      # native TS support (the script uses Node ≥ 24's built-in TS loader).
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - name: Cache CodeQL CLI
        id: cache-codeql
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ runner.temp }}/codeql
          key: codeql-cli-${{ env.CODEQL_BUNDLE }}-linux64
      - name: Install CodeQL CLI
        if: steps.cache-codeql.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$CODEQL_BUNDLE" \
            --repo github/codeql-action \
            --pattern codeql-bundle-linux64.tar.gz \
            --output "$RUNNER_TEMP/codeql.tar.gz"
          tar -xzf "$RUNNER_TEMP/codeql.tar.gz" -C "$RUNNER_TEMP"
      - name: Add CodeQL CLI to PATH
        run: echo "$RUNNER_TEMP/codeql" >> "$GITHUB_PATH"
      - name: Build CodeQL database
        run: node scripts/codeql-api-check.ts --build-db
      - name: Upload CodeQL database
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: codeql-db
          path: .codeql/db
          retention-days: 1
          if-no-files-found: error

  codeql-check:
    name: Public API (${{ matrix.target }})
    needs: codeql-db
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [problems, api-surface, api-signatures]
    env:
      CODEQL_BUNDLE: codeql-bundle-v2.25.4
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - name: Cache CodeQL CLI
        id: cache-codeql
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ runner.temp }}/codeql
          key: codeql-cli-${{ env.CODEQL_BUNDLE }}-linux64
      - name: Install CodeQL CLI
        if: steps.cache-codeql.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$CODEQL_BUNDLE" \
            --repo github/codeql-action \
            --pattern codeql-bundle-linux64.tar.gz \
            --output "$RUNNER_TEMP/codeql.tar.gz"
          tar -xzf "$RUNNER_TEMP/codeql.tar.gz" -C "$RUNNER_TEMP"
      - name: Add CodeQL CLI to PATH
        run: echo "$RUNNER_TEMP/codeql" >> "$GITHUB_PATH"
      - name: Install query pack dependencies
        run: codeql pack install codeql
      # ~/.codeql/compile-cache holds compiled QL artifacts (most importantly, the JS QL
      # standard library). The single-job workflow used to amortize this across query
      # invocations via the on-disk cache; with the matrix split each leg starts cold, so
      # `[1/1 comp]` jumped from ~25s to ~55s per query. Caching the compile-cache between
      # workflow runs (keyed on bundle version + query content) restores the warm path on
      # every PR after the first that touches a query.
      - name: Cache CodeQL compile cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.codeql/compile-cache
          key: codeql-compile-${{ env.CODEQL_BUNDLE }}-${{ hashFiles('codeql/queries/**', 'codeql/qlpack.yml', 'codeql/codeql-pack.lock.yml') }}
          restore-keys: |
            codeql-compile-${{ env.CODEQL_BUNDLE }}-
      - name: Download CodeQL database
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: codeql-db
          path: .codeql/db
      - name: Run ${{ matrix.target }} checks
        run: node scripts/codeql-api-check.ts --target=${{ matrix.target }}
